<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f1f5f9;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .container {
    background: white;
    padding: 30px;
    width: 350px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #cbd5e1;
    border-radius: 5px;
    box-sizing: border-box; /* Garante que o padding não quebre a largura */
  }

  button {
    padding: 12px;
    width: 100%;
    background: #1e40af;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.3s;
  }

  button:hover {
    background: #1e3a8a;
  }

  #mensagem {
    margin-top: 20px;
    font-weight: bold;
    color: #334155;
  }

</style>
</head>
<body>

<div class="container">
  <h2>Cadastro</h2>

  <input type="text" id="nome" placeholder="Digite seu nome">
  <input type="email" id="email" placeholder="Digite seu e-mail">
  <input type="number" id="idade" placeholder="Digite sua idade">

  <button onclick="validar()">Enviar</button>

  <p id="mensagem"></p>
</div>

<script>
function validar() {
  // Captura dos valores
  const nome = document.getElementById("nome").value.trim();
  const email = document.getElementById("email").value.trim();
  const idade = document.getElementById("idade").value;
  const msgElemento = document.getElementById("mensagem");

  // 1. Validação de campos vazios
  if (nome === "" || email === "" || idade === "") {
    msgElemento.style.color = "red";
    msgElemento.innerText = "⚠️ Por favor, preencha todos os campos!";
    return;
  }

  // 2. Nova Validação: Tamanho do nome
  if (nome.length < 3) {
    msgElemento.style.color = "red";
    msgElemento.innerText = "⚠️ O nome deve ter pelo menos 3 caracteres.";
    return;
  }

  // 3. Validação de idade
  if (idade < 18) {
    msgElemento.style.color = "orange";
    msgElemento.innerText = `Olá ${nome}, cadastro restrito para menores de 18 anos.`;
  } else {
    // Mensagem personalizada com nome
    msgElemento.style.color = "green";
    msgElemento.innerText = `✅ Sucesso! Parabéns ${nome}, seu cadastro foi realizado.`;
  }
}
</script>

</body>
</html>
